@if (authService.user$ | async; as user) {
  <div class="profile-container">
    <div class="profile-header">
      <div class="avatar-container">
        <img [src]="currentUser?.profil?.image_profil" alt="Profil" class="avatar-img" (error)="updateUrl($event)">
      </div>

      <div class="profile-info">
        <div class="header-row">
          <h1>{{ $any(user).pseudo }}</h1>
          <button class="edit-btn-gear" (click)="openEditModal()">⚙️ Modifier</button>
        </div>

        <p class="join-date">Membre depuis le {{ currentUser?.createdAt | date:'dd/MM/yyyy' }}</p>
        <p>Bio : {{ currentUser?.profil?.bio }}</p>

        <div class="stats">
          <div class="stat-item">
            <span class="stat-value">0</span>
            <span class="stat-label">Votes</span>
          </div>
          <div class="stat-divider"></div>
          <div class="stat-item">
            <span class="stat-value">0</span>
            <span class="stat-label">Commentaires</span>
          </div>
        </div>
      </div>
    </div>

    @if (isEditModalOpen) {
      <div class="modal-overlay">
        <div class="edit-panel" (click)="$event.stopPropagation()">
          <h2>Modifier le profil</h2>

          <div class="input-group">
            <label>Bio</label>
            <input type="text" [(ngModel)]="tempBio" placeholder="Parle-nous de toi...">
          </div>

          <div class="input-group">
            <label>Photo de profil (URL)</label>
            <input type="text" [(ngModel)]="tempImage" placeholder="Lien vers l'image">
          </div>

          <div class="input-group">
            <label>Ou importer un fichier</label>
            <input type="file" (change)="onFileSelected($event)" accept="image/*">
          </div>

          <div class="modal-actions">
            <button class="btn-cancel" (click)="isEditModalOpen = false">Annuler</button>
            <button class="btn-save" (click)="saveProfile()">Enregistrer</button>
          </div>
        </div>
      </div>
    }

    <div class="profile-nav">
      <button class="filter-btn" [class.active]="selectedTab === 'Notifications'" (click)="selectTab('Notifications')">Notifications</button>
      <button class="filter-btn" [class.active]="selectedTab === 'Mes Votes'" (click)="selectTab('Mes Votes')">Mes Votes</button>
    </div>
  </div>
}
